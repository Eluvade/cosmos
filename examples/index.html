<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos - Celestial generator</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #000000;
        color: #ccc;
        font-family: 'Segoe UI', monospace;
        min-height: 100vh;
    }
    h1 {
        text-align: center;
        padding: 20px;
        color: #88aaff;
        font-size: 1.5rem;
    }
    .controls {
        display: flex;
        justify-content: center;
        gap: 16px;
        padding: 10px 20px;
        flex-wrap: wrap;
        align-items: center;
    }
    .controls label {
        font-size: 0.85rem;
        color: #aaa;
    }
    .controls input, .controls select, .controls button {
        background: #1a1a2e;
        color: #ccc;
        border: 1px solid #333;
        padding: 6px 12px;
        font-size: 0.85rem;
        border-radius: 4px;
    }
    .controls button {
        cursor: pointer;
        background: #2a2a4e;
        color: #88aaff;
        font-weight: bold;
    }
    .controls button:hover { background: #3a3a6e; }
    .planet-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 24px;
        padding: 24px;
        justify-items: center;
        align-items: center;
    }
    .planet-card {
        text-align: center;
        background: #060606;
        border-radius: 8px;
        padding: 12px;
        border: 1px solid #222;
    }
    .planet-card canvas {
        display: block;
        margin: 0 auto 8px;
    }
    .planet-card .label {
        font-size: 0.8rem;
        color: #888;
    }
    .planet-card .fps {
        font-size: 0.7rem;
        color: #666;
        margin-top: 2px;
    }
    .status {
        text-align: center;
        padding: 8px;
        color: #666;
        font-size: 0.8rem;
    }
</style>
</head>
<body>
<h1>Cosmos - Celestial generator</h1>
<div class="controls">
    <label>Seed: <input type="number" id="seed" value="9000"></label>
    <label>Resolution: <input type="number" id="resolution" value="256" min="32" max="1024"></label>
    <label>Size: <input type="number" id="displaySize" value="256" min="64" max="512"></label>
    <label>Speed: <input type="range" id="speed" min="0.01" max="1.0" step="0.01" value="0.1"></label>
    <button id="generate">Generate All</button>
    <button id="randomSeed">Random Seed</button>
    <button id="toggleAnim">Pause</button>
</div>
<div class="status" id="status">Initializing...</div>
<div class="planet-grid" id="grid"></div>

<script type="module">
    import { CelestialType, CelestialGenerator, renderNebula } from '../dist/index.js';

    let animating = true;
    let generators = [];
    let planetData = [];

    function addNebulaCard(grid, seed, resolution, displaySize) {
        const t0 = performance.now();
        const nebulaCanvas = renderNebula(seed, resolution);
        const elapsed = Math.round(performance.now() - t0);

        nebulaCanvas.style.width = displaySize + 'px';
        nebulaCanvas.style.height = displaySize + 'px';

        const card = document.createElement('div');
        card.className = 'planet-card';
        card.appendChild(nebulaCanvas);

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = 'nebula';
        card.appendChild(label);

        const info = document.createElement('div');
        info.className = 'fps';
        info.textContent = `${elapsed}ms`;
        card.appendChild(info);

        grid.appendChild(card);
    }

    function renderAll() {
        const seed = parseInt(document.getElementById('seed').value) || 9000;
        const resolution = parseInt(document.getElementById('resolution').value) || 256;
        const displaySize = parseInt(document.getElementById('displaySize').value) || 256;
        const grid = document.getElementById('grid');
        const status = document.getElementById('status');

        // Clean up
        generators.forEach(g => g.dispose());
        generators = [];
        planetData = [];
        grid.innerHTML = '';

        // All types except Nebula (rendered separately)
        const types = CelestialGenerator.getCelestialTypes().filter(t => t !== CelestialType.Nebula);
        status.textContent = `Creating ${types.length + 1} celestial bodies at ${resolution}px...`;

        for (const type of types) {
            const gen = new CelestialGenerator();
            gen.loadNoiseTexture('./radial-noise.png').catch(() => {});
            generators.push(gen);

            const params = { type, seed, resolution, timeSpeed: 1.0 };

            try {
                gen.render(params, 0);
            } catch (e) {
                console.error(`Failed to render ${type}:`, e);
                const card = document.createElement('div');
                card.className = 'planet-card';
                card.innerHTML = `<div class="label" style="color:#f66">${type}: ${e.message}</div>`;
                grid.appendChild(card);
                continue;
            }

            const canvas = gen.getCanvas();
            canvas.style.width = displaySize + 'px';
            canvas.style.height = displaySize + 'px';

            const card = document.createElement('div');
            card.className = 'planet-card';
            card.appendChild(canvas);

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = type;
            card.appendChild(label);

            const fpsLabel = document.createElement('div');
            fpsLabel.className = 'fps';
            card.appendChild(fpsLabel);

            grid.appendChild(card);
            planetData.push({ gen, params, fpsLabel, frames: 0, lastTime: performance.now() });
        }

        // Nebula (static, Canvas 2D)
        addNebulaCard(grid, seed, resolution, displaySize);

        status.textContent = `${types.length + 1} celestial bodies rendering (nebula is static, others real-time WebGL)`;
    }

    let accumulatedTime = 0;
    let lastFrameTime = performance.now();

    function animate() {
        const now = performance.now();
        const dt = (now - lastFrameTime) / 1000;
        lastFrameTime = now;

        if (animating) {
            const speed = parseFloat(document.getElementById('speed').value) || 0.1;
            accumulatedTime += dt * speed;

            for (const p of planetData) {
                try { p.gen.render(p.params, accumulatedTime); } catch (e) { /* skip */ }

                p.frames++;
                if (now - p.lastTime > 1000) {
                    p.fpsLabel.textContent = `${Math.round(p.frames * 1000 / (now - p.lastTime))} fps`;
                    p.frames = 0;
                    p.lastTime = now;
                }
            }
        }
        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    document.getElementById('generate').addEventListener('click', () => {
        accumulatedTime = 0;
        lastFrameTime = performance.now();
        renderAll();
    });
    document.getElementById('randomSeed').addEventListener('click', () => {
        document.getElementById('seed').value = Math.floor(Math.random() * 100000);
        accumulatedTime = 0;
        lastFrameTime = performance.now();
        renderAll();
    });
    document.getElementById('toggleAnim').addEventListener('click', () => {
        animating = !animating;
        document.getElementById('toggleAnim').textContent = animating ? 'Pause' : 'Play';
    });

    renderAll();
</script>
</body>
</html>
